[workspace]
# Use git-cliff for changelog generation
changelog_config = "cliff.toml"
# Create GitHub releases alongside crates.io publishes
git_release_enable = true

# resq-dsa has independent versioning
[[package]]
name = "resq-dsa"
publish = true

# resq-tui has independent versioning
[[package]]
name = "resq-tui"
publish = true

# CLI has independent versioning.
# Skip GitHub Release creation — release.yml (dispatched by release-plz.yml)
# creates the release as a draft, attaches the cross-platform binaries, and
# only then publishes. Required because the org enforces "immutable
# releases": releases can only be edited while still draft.
[[package]]
name = "resq-cli"
publish = true
git_release_enable = false
