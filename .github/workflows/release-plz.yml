name: Release-plz

on:
  # Weekly release check — every Monday at 06:00 UTC
  schedule:
    - cron: "0 6 * * 1"
  # Manual trigger for on-demand releases
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write   # required to dispatch release.yml below
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Do NOT persist credentials in .git/config — release-plz-action
          # reads GITHUB_TOKEN from the env block below for git push and API
          # calls, so persisting credentials only widens the leak surface
          # (zizmor artipacked audit).
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - id: release-plz
        uses: MarcoIeni/release-plz-action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Tags pushed by this job run under GITHUB_TOKEN, which by design
      # does NOT trigger downstream `on: push: tags:` workflows. Read the
      # action's `releases` JSON output and dispatch release.yml explicitly
      # for each newly-cut resq-cli-v* tag — workflow_dispatch IS allowed
      # from GITHUB_TOKEN, so the hop works without a PAT.
      - name: Dispatch release.yml for new resq-cli-v* tags
        if: steps.release-plz.outputs.releases != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          set -euo pipefail
          echo "$RELEASES" \
            | jq -r '.[] | select(.package_name == "resq-cli") | .tag' \
            | while read -r tag; do
                [ -z "$tag" ] && continue
                echo "→ dispatching release.yml for tag=$tag"
                gh workflow run release.yml \
                  --repo "$GITHUB_REPOSITORY" \
                  -f tag="$tag"
              done
