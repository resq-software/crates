name: Release-plz

on:
  # Weekly release check — every Monday at 06:00 UTC
  schedule:
    - cron: "0 6 * * 1"
  # Manual trigger for on-demand releases
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write   # required to dispatch release.yml below
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - id: release-plz
        uses: MarcoIeni/release-plz-action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Tags pushed by this job run under GITHUB_TOKEN, which by design
      # does NOT trigger downstream `on: push: tags:` workflows. Read the
      # action's `releases` JSON output and dispatch release.yml explicitly
      # for each newly-cut resq-cli-v* tag — workflow_dispatch IS allowed
      # from GITHUB_TOKEN, so the hop works without a PAT.
      - name: Dispatch release.yml for new resq-cli-v* tags
        if: steps.release-plz.outputs.releases != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          set -euo pipefail
          echo "$RELEASES" \
            | jq -r '.[] | select(.package_name == "resq-cli") | .tag' \
            | while read -r tag; do
                [ -z "$tag" ] && continue
                echo "→ dispatching release.yml for tag=$tag"
                gh workflow run release.yml \
                  --repo "$GITHUB_REPOSITORY" \
                  -f tag="$tag"
              done
