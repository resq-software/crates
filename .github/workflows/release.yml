#
# Build and publish resq-cli binaries to a GitHub Release on tag push.
# Tag format:  resq-cli-v<semver>  (e.g. resq-cli-v0.3.0)

name: release

on:
  push:
    tags:
      - 'resq-cli-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. resq-cli-v0.3.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          # macOS x86_64 cross-built from the arm64 runner — no native Intel
          # runner is in the free pool any more (macos-13 was the last one).
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux arm64)
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p resq-cli --target ${{ matrix.target }}
          else
            cargo build --release -p resq-cli --target ${{ matrix.target }}
          fi

      - name: Package
        id: pkg
        shell: bash
        run: |
          bin="resq"
          ext=""
          if [ "${{ runner.os }}" = "Windows" ]; then ext=".exe"; fi
          staging="resq-cli-${{ github.event.inputs.tag || github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${bin}${ext}" "$staging/"
          cp README.md LICENSE* "$staging/" 2>/dev/null || true
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${staging}.zip" "$staging"
            echo "asset=${staging}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "${staging}.tar.gz" "$staging"
            echo "asset=${staging}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.pkg.outputs.asset }}
          path: ${{ steps.pkg.outputs.asset }}
          retention-days: 7

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          merge-multiple: true

      - name: Compute checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      # Create as DRAFT first, upload assets, THEN publish. The org
      # enforces "immutable releases", which means a release is locked the
      # moment it's published — so assets must be attached while still
      # draft. release-plz.toml is configured to skip git_release for
      # resq-cli specifically, so this workflow owns the release lifecycle
      # end-to-end and never collides with release-plz's release object.
      - name: Create + upload + publish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          cd dist

          # If a release already exists (e.g. from a prior failed run that
          # left a draft, or if release-plz git_release_enable was flipped
          # back on), delete it so we start clean. Immutable-published
          # releases can't be deleted — in that case we bail loudly.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            is_draft=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)
            if [ "$is_draft" = "true" ]; then
              echo "→ deleting existing draft $TAG to start clean"
              gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes
            else
              echo "::error::Release $TAG already exists and is published (immutable). Cannot re-upload assets. Cut a new tag."
              exit 1
            fi
          fi

          echo "→ creating draft release $TAG with assets"
          # Notes kept single-line: YAML block scalars treat any line at
          # column 0 (including blank lines inside a multi-line `--notes`
          # value) as terminating the block.
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --title "$TAG" \
            --notes "Binary build for $TAG. Cross-platform resq CLI binaries + SHA256SUMS. Verify with: sha256sum -c SHA256SUMS" \
            -- *

          echo "→ publishing release $TAG (becomes immutable)"
          gh release edit "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
