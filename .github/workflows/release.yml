#
# Build and publish resq-cli binaries to a GitHub Release on tag push.
# Tag format:  resq-cli-v<semver>  (e.g. resq-cli-v0.3.0)

name: release

on:
  push:
    tags:
      - 'resq-cli-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. resq-cli-v0.3.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux arm64)
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p resq-cli --target ${{ matrix.target }}
          else
            cargo build --release -p resq-cli --target ${{ matrix.target }}
          fi

      - name: Package
        id: pkg
        shell: bash
        run: |
          bin="resq"
          ext=""
          if [ "${{ runner.os }}" = "Windows" ]; then ext=".exe"; fi
          staging="resq-cli-${{ github.event.inputs.tag || github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${bin}${ext}" "$staging/"
          cp README.md LICENSE* "$staging/" 2>/dev/null || true
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "${staging}.zip" "$staging"
            echo "asset=${staging}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "${staging}.tar.gz" "$staging"
            echo "asset=${staging}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.asset }}
          path: ${{ steps.pkg.outputs.asset }}
          retention-days: 7

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
