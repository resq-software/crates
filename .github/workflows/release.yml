name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish resq-tui
        run: cargo publish -p resq-tui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for resq-tui to index
        run: sleep 60

      - name: Publish resq-cli
        run: cargo publish -p resq-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish tools (parallel batch)
        run: |
          cargo publish -p resq-deploy-cli &
          cargo publish -p resq-health-checker &
          cargo publish -p resq-log-viewer &
          cargo publish -p resq-perf-monitor &
          cargo publish -p resq-flamegraph &
          cargo publish -p resq-bin-explorer &
          cargo publish -p resq-cleanup &
          wait
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
