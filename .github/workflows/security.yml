# Thin caller for the org-wide reusable security-scan workflow in
# resq-software/.github.

name: security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  scan:
    uses: resq-software/.github/.github/workflows/security-scan.yml@bd95037a0adee215496a0c42eb825200bcfebbf8 # main
    with:
      languages: '["actions"]'
      enable-semgrep: true
    secrets: inherit # zizmor: ignore[secrets-inherit] — org-internal reusable workflow
