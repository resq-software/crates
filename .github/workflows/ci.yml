#
# Thin CI wrapper. Dispatches to the org-wide reusable rust-ci workflow
# (fmt + clippy + test + coverage + cargo-deny). Subsumes clippy.yml and
# deny.yml (both removed in the same PR). Security scanning stays in
# security.yml.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    uses: resq-software/.github/.github/workflows/rust-ci.yml@2e2af3e5e32b646480a1cb1b41875e5073020814
    with:
      toolchain: stable
      run-fmt: true
      run-clippy: true
      run-test: true
      run-deny: true
      run-coverage: true
    secrets: inherit

  required:
    name: required
    runs-on: ubuntu-latest
    needs: [rust]
    if: always()
    steps:
      - name: Aggregate
        env:
          RUST_RESULT: ${{ needs.rust.result }}
        run: |
          set -eu
          case "$RUST_RESULT" in
            success|skipped|"") echo "ok: rust=$RUST_RESULT" ;;
            *) echo "::error::rust reusable returned: $RUST_RESULT"; exit 1 ;;
          esac
