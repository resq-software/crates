updates:
- commit-message:
    include: scope
    prefix: chore
  directory: /
  groups:
    actions-minor-patch:
      update-types:
      - minor
      - patch
  ignore:
  - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  labels:
  - dependencies
  - github-actions
  open-pull-requests-limit: 3
  package-ecosystem: github-actions
  schedule:
    day: monday
    interval: weekly
- commit-message:
    include: scope
    prefix: chore
  directory: /
  groups:
    rust-minor-patch:
      update-types:
      - minor
      - patch
  labels:
  - dependencies
  - rust
  open-pull-requests-limit: 5
  package-ecosystem: cargo
  schedule:
    day: tuesday
    interval: weekly
version: 2
